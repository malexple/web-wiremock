<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-dark bg-dark px-3 py-0 app-navbar">
    <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/stubs}">
        <i class="bi bi-box-seam text-warning"></i>
        <span class="fw-bold">Web WireMock</span>
    </a>
    <ul class="navbar-nav ms-3">
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center gap-1"
               th:classappend="${activePage == 'stubs'} ? 'active' : ''"
               th:href="@{/stubs}">
                <i class="bi bi-grid-3x3-gap-fill"></i>
                Stubs
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center gap-1"
               th:classappend="${activePage == 'requests'} ? 'active' : ''"
               th:href="@{/requests}">
                <i class="bi bi-journal-text"></i>
                Requests
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center gap-1"
               th:classappend="${activePage == 'scenarios'} ? 'active' : ''"
               th:href="@{/scenarios}">
                <i class="bi bi-diagram-3-fill"></i>
                Сценарии
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center gap-1"
               th:classappend="${activePage == 'profiles'} ? 'active' : ''"
               th:href="@{/profiles}">
                <i class="bi bi-collection-fill"></i>
                Профили
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center gap-1"
               th:classappend="${activePage == 'recording'} ? 'active' : ''"
               th:href="@{/recording}">
                <i class="bi bi-collection-fill"></i>
                Запись
            </a>
        </li>
    </ul>
    <div class="ms-auto d-flex align-items-center gap-2">
        <span class="badge bg-secondary" id="wiremockStatus">
            <i class="bi bi-circle-fill text-warning"></i> WireMock
        </span>
    </div>
</nav>
</body>
</html>
