services:

  wiremock:
    image: wiremock/wiremock:3.13.1
    container_name: wiremock-server
    ports:
      - "8888:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
      - ./wiremock/extensions:/var/wiremock/extensions
      - ./wiremock/profiles:/home/wiremock/profiles
    command:
      - "--port=8080"
      - "--verbose"
      - "--local-response-templating"
      - "--permitted-system-keys=.*"
    networks:
      - wiremock-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/__admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s      # ← даём 30s на старт до начала проверок
    restart: unless-stopped

  web-wiremock:
    image: malexple/web-wiremock:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-wiremock-ui
    ports:
      - "8080:8080"
    environment:
      INTEGRATION_WIREMOCK-HOST: http://wiremock:8080
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - ./wiremock/profiles:/app/wiremock/profiles
    depends_on:
      wiremock:
        condition: service_healthy
    networks:
      - wiremock-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  wiremock-net:
    driver: bridge
