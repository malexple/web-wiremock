version: '3.9'

# ─── Запуск: docker-compose up ─────────────────────────────────
# Сначала собрать JAR: ./gradlew bootJar
# Оба сервиса в одной сети, UI доступен на http://localhost:8080

services:

  wiremock:
    image: wiremock/wiremock:3.13.1
    container_name: wiremock-server
    ports:
      - "8888:8080"       # Admin UI WireMock доступен снаружи для отладки
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
      - ./wiremock/extensions:/var/wiremock/extensions
      - ./wiremock/profiles:/app/wiremock/profiles
    command:
      - "--port=8080"
      - "--verbose"
      - "--local-response-templating"
      - "--permitted-system-keys=.*"
    networks:
      - wiremock-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/__admin/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web-wiremock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-wiremock-ui
    ports:
      - "8080:8080"
    environment:
      # Переопределяем хост WireMock — используем имя сервиса внутри docker-сети
      INTEGRATION_WIREMOCK-HOST: http://wiremock:8080
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      wiremock:
        condition: service_healthy
    networks:
      - wiremock-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  wiremock-net:
    driver: bridge
